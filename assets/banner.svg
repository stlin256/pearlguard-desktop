    <circle cx="186" cy="0" r="9" fill="#23a36d"/>
    <path d="M25 164 H205" stroke="#17324d" stroke-opacity="0.35" stroke-width="5" stroke-linecap="round"/>
    <path d="M55 142 H205" stroke="#17324d" stroke-opacity="0.22" stroke-width="5" stroke-linecap="round"/>
