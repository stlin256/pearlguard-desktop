name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    env:
      GH_REPO: stlin256/pearlguard-desktop
      PEARLGUARD_DISABLE_TRANSFER: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Wails smoke test
        run: npm run test:e2e

      - name: Privacy scan
        run: npm run privacy:scan

      - name: Build Windows portable executable
        if: runner.os == 'Windows'
        run: wails build -clean -trimpath -ldflags "-s -w" -webview2 browser -o PearlGuard-Desktop.exe

      - name: Build macOS and Linux app
        if: runner.os != 'Windows'
        run: wails build -clean -trimpath -ldflags "-s -w" -o PearlGuard-Desktop

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PearlGuard-${{ matrix.os }}
          path: build/bin/**
          if-no-files-found: error

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: build/bin/**
          body: |
            PearlGuard Desktop release for `${{ github.repository }}`.

            This release uses the Wails desktop runtime, GUI-managed local settings, and dry-run validation in automated tests. Review `README.md`, `SECURITY.md`, `PRIVACY.md`, and `DISCLAIMER.md` before using the application with real wallet workflows.
